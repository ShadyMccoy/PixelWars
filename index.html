<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PixelWars · Tile Strategy Sandbox</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect x='4' y='4' width='10' height='10' fill='%23ff4d6d'/><rect x='18' y='4' width='10' height='10' fill='%233ea6ff'/><rect x='4' y='18' width='10' height='10' fill='%23a16bff'/><rect x='18' y='18' width='10' height='10' fill='%2352e0a4'/></svg>" />
  </head>
  <body>
    <header class="app-header">
      <div class="brand">PixelWars</div>
      <div class="brand-sub">Tile Strategy Sandbox</div>
      <div class="header-spacer"></div>
      <button id="btn-try-bot" class="btn" title="Paste a bot script and seat it in the next match">⚙ Try a bot</button>
      <span class="tick-pill" id="tick-label">t=0</span>
      <span class="kbd">Space</span><span class="brand-sub">play</span>
      <span class="kbd">.</span><span class="brand-sub">step</span>
      <span class="kbd">R</span><span class="brand-sub">reset</span>
      <span class="kbd">L</span><span class="brand-sub">replay</span>
      <span class="kbd">S</span><span class="brand-sub">save</span>
      <span id="seed-pill" class="seed-pill" title="Click to copy">seed=–</span>
    </header>

    <aside class="sidebar">
      <p id="mode-description" class="status-line"></p>

      <div>
        <div class="section-title">Simulation</div>
        <div class="controls">
          <button id="btn-play" class="btn primary">⏸ Pause</button>
          <button id="btn-step" class="btn">⏭ Step</button>
          <button id="btn-reset" class="btn" title="New seed, same lineup &amp; map">↻ New seed</button>
          <button id="btn-replay" class="btn" title="Replay same seed">↺ Replay</button>
          <button id="btn-save" class="btn" title="Save this seed to your local list">★ Save</button>
        </div>
        <div class="slider-row" style="margin-top:10px;">
          <span class="brand-sub">Speed</span>
          <input id="speed" type="range" min="0.1" max="5" step="0.1" value="1" />
          <span id="speed-label" class="label">1.0x</span>
        </div>
      </div>

      <div>
        <div class="section-title">View</div>
        <div class="toggles">
          <label><input id="toggle-grid" type="checkbox" checked />Grid</label>
          <label><input id="toggle-territory" type="checkbox" checked />Territory shading</label>
          <label><input id="toggle-glow" type="checkbox" checked />Army glow</label>
          <label><input id="toggle-moves" type="checkbox" checked />Movement</label>
          <label class="toggle-sub">Style
            <select id="move-style" class="dropdown-mini">
              <option value="circle">Circle</option>
              <option value="line">Line</option>
            </select>
          </label>
          <label><input id="toggle-conflicts" type="checkbox" checked />Conflict residue</label>
          <label><input id="toggle-overlay" type="checkbox" />Strategy overlay</label>
          <label><input id="toggle-3d" type="checkbox" />3D view (height = army size)</label>
        </div>
      </div>

      <div>
        <div class="section-title">Map</div>
        <div class="map-editor">
          <div id="me-presets" class="preset-tabs"></div>
          <div class="me-grid">
            <label>Width<input id="me-width" type="number" min="6" max="120" value="30" /></label>
            <label>Height<input id="me-height" type="number" min="6" max="120" value="22" /></label>
            <label>Growth<input id="me-growth" type="number" min="0.1" max="5" step="0.1" value="1.8" /></label>
            <label>Max army<input id="me-max-army" type="number" min="1" max="20" value="6" /></label>
            <label>Players<input id="me-players" type="number" min="2" max="8" value="4" /></label>
            <label class="me-check"><input id="me-wrap" type="checkbox" checked />Wrap</label>
          </div>
        </div>
      </div>

      <div>
        <div class="match-picker-head">
          <div class="section-title" style="margin:0;">Rankings</div>
          <button id="btn-leagues-refresh" class="btn-mini" title="Reload tournament/rankings.json">↻</button>
        </div>
        <div id="league-viewer" class="league-viewer">
          <div class="hud-empty">Loading…</div>
        </div>
      </div>

      <div>
        <div class="match-picker-head">
          <div class="section-title" style="margin:0;">Saved Matches</div>
          <button id="btn-matches-refresh" class="btn-mini" title="Reload tournament/interesting.json">↻</button>
        </div>
        <div id="match-picker" class="match-picker">
          <div class="hud-empty">Loading…</div>
        </div>
      </div>

      <div>
        <div class="section-title">Legend</div>
        <div class="legend">
          <div>⚔ army count · ⬢ total strength · ▣ tiles owned</div>
        </div>
      </div>
    </aside>

    <main class="stage">
      <canvas id="game-canvas"></canvas>
      <div class="stage-overlay">
        <div class="mode-name" id="mode-name-overlay"></div>
      </div>
    </main>

    <aside class="rightbar">
      <div>
        <div class="section-title">Players</div>
        <div id="hud-root"></div>
      </div>
      <div>
        <div class="section-title">Strength over time</div>
        <canvas id="chart-canvas"></canvas>
      </div>
      <div>
        <div class="section-title">Territory over time</div>
        <canvas id="territory-chart-canvas"></canvas>
      </div>
      <div>
        <div class="section-title">Event log</div>
        <div id="event-log" class="event-log"></div>
      </div>
    </aside>

    <script type="module" src="src/main.js"></script>
  </body>
</html>
